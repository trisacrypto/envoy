{{ define "createCounterpartyModal" }}
<div id="createCounterpartyModal" class="modal modal-lg" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Add Counterparty</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="createCounterpartyAlerts" class="alerts"></div>
        <form
          id="createCounterpartyForm"
          hx-post="/v1/counterparties"
          hx-ext="json-enc"
          hx-swap="none"
          hx-indicator="#loaderCreateCounterparty"
          hx-disabled-elt="next button[type='submit'], next button[type='reset']"
        >
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label" for="protocol">Protocol</label>
                <select class="form-control" id="protocol" name="protocol" required>
                  <option value="trisa">TRISA</option>
                  <option value="trp">TRP</option>
                  <option value="sunrise">Sunrise</option>
                </select>
                <small class="form-text mt-1">
                  Choose how transfers are sent to this counterparty.
                </small>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label" for="country">Country</label>
                <select class="form-control" id="country" name="country" data-countries='{"searchEnabled": true}' required></select>
                <small class="form-text mt-1">
                  Two-letter country code used for routing and display.
                </small>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="name">Legal Entity Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label" for="common_name">Common Name</label>
                <input type="text" class="form-control" id="common_name" name="common_name" required>
                <small class="form-text mt-1">
                  Hostname or identifier for the endpoint certificate.
                </small>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <label class="form-label" for="endpoint">Endpoint</label>
                <input type="text" class="form-control" id="endpoint" name="endpoint" placeholder="trisa.example.com:443" required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="website">Website</label>
            <input type="url" class="form-control" id="website" name="website" placeholder="https://example.com">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <span id="loaderCreateCounterparty" class="htmx-indicator spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        <button type="submit" form="createCounterpartyForm" class="btn btn-primary">Create</button>
        <button type="reset" form="createCounterpartyForm" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
{{ end }}
